# ─── Rate limiting zones ─────────────────────────────────────────────────────
# general: 20 req/s per IP, burst up to 40
# login:   strict 5 req/min per IP for admin panel
limit_req_zone  $binary_remote_addr zone=general:10m rate=20r/s;
limit_req_zone  $binary_remote_addr zone=login:10m   rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

upstream django {
    server web:8000;
    keepalive 32;
}

# ─── HTTP → HTTPS redirect + ACME challenge ──────────────────────────────────
server {
    listen 80;
    server_name platanus.uz www.platanus.uz;

    # Let's Encrypt webroot challenge (certbot writes here)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ───────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name platanus.uz www.platanus.uz;

    # ── SSL certificates (managed by Certbot) ────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/platanus.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/platanus.uz/privkey.pem;

    # Modern SSL: TLS 1.2 + 1.3 only, strong ciphers
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_tickets       off;

    # OCSP stapling — speeds up handshake, verifies cert online
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    client_max_body_size 20M;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"     always;

    # Default rate limiting for all routes
    limit_req  zone=general burst=40 nodelay;
    limit_conn conn_limit 20;

    # ── Static files — served directly by Nginx ──────────────────────────────
    location /static/ {
        alias   /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        gzip_static on;
    }

    # ── Media files — user-uploaded content ──────────────────────────────────
    location /media/ {
        alias   /app/src/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Admin panel — stricter rate limiting ─────────────────────────────────
    location /admin/ {
        limit_req  zone=login  burst=5  nodelay;
        limit_conn conn_limit  5;

        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;

        proxy_connect_timeout  60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # ── All other requests → Gunicorn ────────────────────────────────────────
    location / {
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;

        proxy_connect_timeout  60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;

        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 8k;
    }
}
