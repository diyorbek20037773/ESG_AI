# Base configuration — shared by all environments.
# Do NOT use directly. Always combine with an overlay:
#   Local:  docker compose -f docker-compose.yml -f docker-compose.local.yml up --build
#   Prod:   docker compose -f docker-compose.yml -f docker-compose.prod.yml  up -d --build

services:

  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-platanus} -d ${DB_NAME:-platanus_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    volumes:
      - media_volume:/app/src/media
      - static_volume:/app/staticfiles
    env_file: .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  media_volume:
  static_volume:
