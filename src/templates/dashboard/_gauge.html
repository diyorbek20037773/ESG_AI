<div class="nv-gauge" data-gauge="{{ value }}">
  <svg width="104" height="104" viewBox="0 0 100 100" role="img" aria-label="{{ label }}: {{ value }}">
    <circle class="nv-gauge-track" cx="50" cy="50" r="42"></circle>
    <circle class="nv-gauge-arc" cx="50" cy="50" r="42"></circle>
    <text class="nv-gauge-val" x="50" y="57" text-anchor="middle" data-count="{{ value }}">0</text>
  </svg>
  <div class="nv-gauge-name">{{ label }}</div>
</div>
