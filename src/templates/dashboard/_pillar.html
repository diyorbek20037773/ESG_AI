{% load i18n %}
<div class="col-md-4">
  <div class="esg-pillar h-100 p-3 rounded-4 border">
    <div class="d-flex align-items-center justify-content-between mb-2">
      <span class="fw-semibold"><i class="ti {{ icon }} me-1" style="color:{{ color }};"></i>{{ label }}</span>
      <span class="fw-bold" style="color:{{ color }};">{{ score }}</span>
    </div>
    <div class="progress mb-2" style="height:8px;">
      <div class="progress-bar" role="progressbar" style="width:{{ score }}%;background:{{ color }};"
           aria-valuenow="{{ score }}" aria-valuemin="0" aria-valuemax="100"></div>
    </div>
    {% if summary %}<p class="small text-secondary mb-0">{{ summary }}</p>{% endif %}
  </div>
</div>
